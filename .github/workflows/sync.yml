name: Sync Formula E Calendar

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC = 08:00 Dubai, daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build feed
        run: python fe_sync.py FormulaE.ics

      - name: Commit if changed
        run: |
          git config user.name "fe-sync-bot"
          git config user.email "actions@github.com"
          git add FormulaE.ics
          git diff --cached --quiet || git commit -m "Auto-sync Formula E calendar $(date -u +%F)"
          git push
